<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="calculadora.css">
    <link rel="icon" href="img/jackie2.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+QLD:wght@100..400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculadora">
        <input type="text" id="pantalla" disabled>
        <div class="botones">
            <button onclick="limpiar()" class="clear" >C</button>
            <button onclick="agregar(`/`)">/</button>
            <button onclick="agregar(`*`)">*</button>
            <button onclick="borrar()">←</button>

            <button onclick="agregar(`7`)">7</button>
            <button onclick="agregar(`8`)">8</button>
            <button onclick="agregar(`9`)">9</button>
            <button onclick="agregar(`-`)">-</button>

            <button onclick="agregar(`4`)">4</button>
            <button onclick="agregar(`5`)">5</button>
            <button onclick="agregar(`6`)">6</button>
            <button onclick="agregar(`+`)">+</button>

            <button onclick="agregar(`1`)">1</button>
            <button onclick="agregar(`2`)">2</button>
            <button onclick="agregar(`3`)">3</button>
            <button onclick="calcular()">=</button>

            <button onclick="agregar(`0`)">0</button>
            <button onclick="agregar(`.`)">.</button>
            <button onclick="raiz()">√</button>
            <button onclick="porcentaje()">%</button>
            <button onclick="cuadrado()">x²</button>
            <button onclick="cubo()">x³</button>

            <button onclick="ecuacion1()">Ax + B</button>
            <button onclick="ecuacion2()">Ax² + Bx + C</button>
            <button onclick="absoluto()">|x|</button>
            <button onclick="raiz3()">∛</button>

            <button onclick="seno()">sin</button>
            <button onclick="coseno()">cos</button>
            <button onclick="tangente()">tan</button>
            <button onclick="agregarPI()">π</button>
            <button onclick="inverso()" class="cientifico ancho2">1/x</button>
            <button onclick="exp()" class="cientifico full">eˣ</button>

            <button onclick="guardar()">MS</button>
            <button onclick="RECUPERAR()">MR</button>
            <button onclick="limpiarMemoria()">MC</button>

            <button onclick="cambiarSigno()">±</button>
            <button onclick="resolverSistema(`cramer`)" class="metodo">Cramer</button>
            <button onclick="resolverSistema(`sus`)" class="metodo">Sus</button>
            <button onclick="resolverSistema(`Igual`)" class="metodo">Igual</button>

            <button onclick="combinacion()">nCr</button>
            <button onclick="permutacion()">nPr</button>
            <button onclick="modulo()">mod</button>
            <button onclick="redondear()" class="redondeo">≈</button>
            <button onclick="usarAns()">ANS</bu9tton>
            <button onclick="borrarHistorial()">AC</bu9tton>
            <button onclick="copiar()"> COPY</bu9tton>
            <button onclick="toggleSigno()">±</bu9tton>
        </div>
    </div>
    <script src="calculadora.js"></script>
</body>
</html>
