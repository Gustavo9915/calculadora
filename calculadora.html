<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="calculadora.css">
</head>
<body>
    <div class="calculadora">
        <input type="text" id="pantalla" disabled>
        <div class="botones">
            <button onclick="limpiar()" class="clear" >C</button>
            <button onclick="agregar(`/`)">/</button>
            <button onclick="agregar(`*`)">*</button>
            <button onclick="borrar()">←</button>

            <button onclick="agregar(`7`)">7</button>
            <button onclick="agregar(`8`)">8</button>
            <button onclick="agregar(`9`)">9</button>
            <button onclick="agregar(`-`)">-</button>

            <button onclick="agregar(`4`)">4</button>
            <button onclick="agregar(`5`)">5</button>
            <button onclick="agregar(`6`)">6</button>
            <button onclick="agregar(`+`)">+</button>

            <button onclick="agregar(`1`)">1</button>
            <button onclick="agregar(`2`)">2</button>
            <button onclick="agregar(`3`)">3</button>
            <button onclick="calcular()">=</button>

            <button onclick="agregar(`0`)">0</button>
            <button onclick="agregar(`.`)">.</button>
            <button onclick="raiz()">√</button>
            <button onclick="porcentaje()">%</button>
            <button onclick="cuadrado()">x²</button>
            <button onclick="cubo()">x³</button>

            <button onclick="ecuacion1()">Ax + B</button>
            <button onclick="ecuacion2()">Ax² + Bx + C</button>
            <button onclick="absoluto()">|x|</button>
            <button onclick="raiz3()">∛</button>

            <button onclick="seno()">sin</button>
            <button onclick="coseno()">cos</button>
            <button onclick="tangente()">tan</button>
            <button onclick="agregarPI()">π</button>
        </div>
    </div>
    <script src="calculadora.js"></script>
</body>
</html>
